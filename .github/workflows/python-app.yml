name: Python Scraping and Database Update

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 1,2'  # Lunes y martes a las 10:00 UTC (12:00 hora peninsular española)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Chrome browser
        run: |
          sudo apt-get update
          sudo apt-get install -y chromium-browser chromium-chromedriver

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ensure selenium is installed
          pip install selenium webdriver-manager

      - name: Run the scraping script with error capture
        env:
          GOLF_USER: ${{ secrets.GOLF_USER }}
          GOLF_PASSWORD: ${{ secrets.GOLF_PASSWORD }}
          CHROME_PATH: /usr/bin/chromium-browser
          CHROMEDRIVER_PATH: /usr/bin/chromedriver
        run: |
          # Run script and capture output
          python refreshScores.py 2>&1 | tee scraping_output.log
          
      - name: Export database to JSON for GitHub Pages
        run: |
          python - <<'PY'
          import sqlite3
          import json
          import os

          db_path = "golf.db"
          if not os.path.exists(db_path):
              print("Base de datos no encontrada")
              exit(1)

          conn = sqlite3.connect(db_path)
          conn.row_factory = sqlite3.Row
          cur = conn.cursor()

          # Obtener todos los jugadores
          cur.execute("SELECT * FROM players ORDER BY nickname")
          players = [dict(row) for row in cur.fetchall()]

          # Para cada jugador, obtener sus resultados — con orden cronológico correcto
          for player in players:
              player_id = player["id"]
              cur.execute("""
                  SELECT fecha, nombre_torneo, club, form_calc, res_hcp,
                         dif_neto, res_stb, hcp_ini, hcp_fin
                  FROM results
                  WHERE player_id = ?
                  ORDER BY 
                      CAST(SUBSTR(fecha, instr(fecha, '/') + 1) AS INTEGER) DESC,
                      CAST(SUBSTR(fecha, 1, instr(fecha, '/') - 1) AS INTEGER) DESC
              """, (player_id,))
              player["results"] = [dict(row) for row in cur.fetchall()]

          # Crear carpeta data si no existe
          os.makedirs("data", exist_ok=True)

          # Guardar JSON bonito
          with open("data/players.json", "w", encoding="utf-8") as f:
              json.dump(players, f, ensure_ascii=False, indent=2)
          print(f"Exportados {len(players)} jugadores a data/players.json")
          PY

      - name: Commit and push updated players.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/players.json
          git commit -m "Update scores data (auto-export from DB)" || echo "No changes to commit"
          git push

      - name: Upload database artifact
        uses: actions/upload-artifact@v4
        with:
          name: golf-database
          path: golf.db
        if: always()  # Upload even if previous steps failed

      - name: Upload debug screenshots and logs
        if: always()  # Always upload debug info, even on success
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots-and-logs
          path: |
            *.png
            *.jpg
            *.log
            error_*.png
            screenshot_*.png
            scraping_output.log
            page_source_*.html
          retention-days: 7

      - name: Upload full page source if exists
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: page-source-on-error
          path: page_source_*.html
          retention-days: 14
